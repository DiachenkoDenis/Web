<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    name="description"
    content="Реєстр генеруючих установок електростанцій"
  />
  <title>Реєстр генеруючих установок</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>⚡ Реєстр генеруючих установок</h1>
      <p>
        Форма реєстрації електростанцій 
      </p>
    </header>

    <main>
      <section class="form-section">
        <h2>Додати електростанцію</h2>

        <form id="plantForm">
          <div class="form-group">
            <label for="enterprise">Підприємство *</label>
            <input
              type="text"
              id="enterprise"
              name="enterprise"
              required
              placeholder="Наприклад: ТОВ ЕнергоСила"
            />
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="edrpou">ЄДРПОУ *</label>
              <input
                type="text"
                id="edrpou"
                name="edrpou"
                required
                maxlength="8"
                pattern="\d{8}"
                placeholder="12345678"
              />
            </div>

            <div class="form-group">
              <label for="plantType">Тип електростанції *</label>
              <select id="plantType" name="plantType" required>
                <option value="">Оберіть тип</option>
                <option value="solar">Сонячна електростанція</option>
                <option value="wind">Вітрова електростанція</option>
                <option value="hydro">Гідроелектростанція</option>
                <option value="thermal">Теплова електростанція</option>
                <option value="biogas">Біогазова установка</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="power">Потужність, МВт *</label>
              <input
                type="number"
                id="power"
                name="power"
                required
                min="0.1"
                step="0.1"
                placeholder="25.5"
              />
            </div>

            <div class="form-group">
              <label for="license">Номер ліцензії *</label>
              <input
                type="text"
                id="license"
                name="license"
                required
                placeholder="AE-458921"
              />
            </div>
          </div>

          <div class="form-group">
            <label for="location">Адреса / локація</label>
            <input
              type="text"
              id="location"
              name="location"
              placeholder="м. Львів, вул. Енергетична, 10"
            />
          </div>

          <div class="form-group">
            <label for="notes">Примітки</label>
            <textarea
              id="notes"
              name="notes"
              rows="4"
              placeholder="Додаткова інформація про установку"
            ></textarea>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Зберегти</button>
            <button type="reset" class="btn btn-secondary">Очистити</button>
          </div>
        </form>

        <div id="message" class="message"></div>
      </section>

      <section class="data-section">
        <h2>Зареєстровані установки</h2>
        <div id="plantsList" class="plants-list"></div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
